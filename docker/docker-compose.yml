services:
  api:
    build: ..
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: model/heart_disease_pipeline.joblib
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"

