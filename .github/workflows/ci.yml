name: CI
on:
  push:
  pull_request:
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: flake8 src api tests
      - name: Test
        run: pytest -q
      - name: Train model
        run: python -m src.train
      - name: Upload training evidence
        uses: actions/upload-artifact@v4
        with:
          name: training-evidence
          path: |
            model/heart_disease_pipeline.joblib
            model/training_summary.json
            screenshots/*.png
            mlflow.db
          if-no-files-found: error
      - name: Build Docker image
        run: docker build -t heart-disease-mlops:${{ github.sha }} .
      - name: Docker smoke test
        run: |
          docker run --detach --rm --name heart-disease-api -p 8000:8000 heart-disease-mlops:${{ github.sha }}
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health > docker-health.json; then
              break
            fi
            sleep 2
          done
          test -s docker-health.json
          curl --fail --silent --show-error \
            --request POST http://127.0.0.1:8000/predict \
            --header 'Content-Type: application/json' \
            --data '{"age":63,"sex":1,"cp":3,"trestbps":145,"chol":233,"fbs":1,"restecg":0,"thalach":150,"exang":0,"oldpeak":2.3,"slope":0,"ca":0,"thal":1}' \
            > docker-predict.json
          cat docker-health.json
          cat docker-predict.json
      - name: Upload Docker smoke-test evidence
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-test-evidence
          path: |
            docker-health.json
            docker-predict.json
          if-no-files-found: error
